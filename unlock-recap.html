<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlock Recap | Mindjset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body{
      background:#000;
      color:#fff;
      font-family:"Inter",sans-serif;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    a{ text-decoration:none; color:inherit; }
    img,video{ display:block; width:100%; }

    .page{
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.04), transparent 24%),
        radial-gradient(circle at 10% 18%, rgba(255,40,40,.06), transparent 18%),
        #000;
    }

    .shell{
      width:min(1240px, calc(100% - 28px));
      margin:auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      background:rgba(0,0,0,.62);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .topbar-inner{
      width:min(1240px, calc(100% - 28px));
      margin:auto;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand-mark{
      font-size:10px;
      letter-spacing:.28em;
      text-transform:uppercase;
      font-weight:700;
      color:rgba(255,255,255,.58);
      white-space:nowrap;
    }

    .back-link{
      font-size:11px;
      font-weight:600;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#fff;
    }

    .menu-section{
      padding:18px 0 8px;
    }

    .menu-wrap{
      padding:10px 0 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .tab-bar{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .tab-btn{
      position:relative;
      padding:0;
      border:none;
      background:transparent;
      color:rgba(255,255,255,.34);
      cursor:pointer;
      font-family:"Inter",sans-serif;
      font-size:12px;
      font-weight:700;
      letter-spacing:.22em;
      text-transform:uppercase;
      transition:color .25s ease;
      white-space:nowrap;
    }

    .tab-btn::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-10px;
      width:0;
      height:1px;
      background:#fff;
      transition:width .28s ease;
    }

    .tab-btn:hover{
      color:rgba(255,255,255,.75);
    }

    .tab-btn.active{
      color:#fff;
    }

    .tab-btn.active::after{
      width:100%;
    }

    .panel{
      display:none;
      padding:18px 0 70px;
      animation:fadeIn .28s ease;
    }

    .panel.active{
      display:block;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(8px);}
      to{opacity:1; transform:translateY(0);}
    }

    .section-head{
      padding:12px 0 24px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:24px;
    }

    .city{
      font-size:11px;
      color:rgba(255,255,255,.48);
      letter-spacing:.30em;
      text-transform:uppercase;
      font-weight:700;
      margin-bottom:10px;
    }

    .date{
      font-size:clamp(30px, 8vw, 56px);
      line-height:.94;
      letter-spacing:-.065em;
      text-transform:uppercase;
      font-weight:800;
    }

    .photo-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:8px;
    }

    .thumb{
      border:none;
      padding:0;
      overflow:hidden;
      border-radius:16px;
      aspect-ratio:1/1;
      cursor:pointer;
      background:#0a0a0a;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .3s ease;
    }

    .thumb:hover img{
      transform:scale(1.04);
    }

    .video-label{
      margin:28px 0 12px;
      font-size:11px;
      color:rgba(255,255,255,.52);
      letter-spacing:.24em;
      text-transform:uppercase;
    }

    .video-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .video-card{
      overflow:hidden;
      border-radius:20px;
      background:#0a0a0a;
    }

    .video-card video{
      aspect-ratio:16/10;
      object-fit:cover;
    }

    .empty-meta{
      font-size:14px;
      line-height:1.7;
      color:rgba(255,255,255,.60);
      margin-bottom:18px;
    }

    .events-link{
      font-size:10px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .closing{
      padding:0 0 72px;
    }

    .closing-copy{
      text-align:center;
      font-size:clamp(12px, 3.8vw, 34px);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:700;
    }

    @media (min-width:721px){
      .photo-grid{ grid-template-columns:repeat(5,1fr); gap:10px; }
      .video-grid{ grid-template-columns:1fr 1fr; }
    }

    @media (min-width:1080px){
      .photo-grid{ grid-template-columns:repeat(6,1fr); gap:12px; }
    }

    @media (max-width:520px){
      .tab-bar{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:16px 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-mark">Mindjset Recap</div>
        <a class="back-link" href="index.html">Back to home</a>
      </div>
    </header>

    <section class="menu-section">
      <div class="shell">
        <div class="menu-wrap">
          <nav class="tab-bar">
            <button class="tab-btn active" data-event="milano">Milano</button>
            <button class="tab-btn" data-event="roma">Roma</button>
            <button class="tab-btn" data-event="barcellona">Barcellona</button>
            <button class="tab-btn" data-event="other-moments">Other Cities</button>
          </nav>
        </div>
      </div>
    </section>

    <section class="shell">
      <article class="panel active" id="milano">
        <div class="section-head">
          <div class="city">Milano</div>
          <div class="date">28 March 2026</div>
        </div>

        <div class="photo-grid" id="milano-photos">
          <!-- INCOLLA QUI TUTTI I TUOI 51 BUTTON DELLE FOTO MILANO -->
        </div>

        <div class="video-label">Video Moments</div>
        <div class="video-grid">
          <div class="video-card">
            <video controls preload="metadata" poster="images/milano (1).jpg">
              <source src="videos/milano-recap-1.mp4" type="video/mp4">
            </video>
          </div>
          <div class="video-card">
            <video controls preload="metadata" poster="images/milano (18).jpg">
              <source src="videos/milano-recap-2.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </article>

      <article class="panel" id="roma">
        <div class="section-head">
          <div class="city">Roma</div>
          <div class="date">25 April 2026</div>
        </div>
        <div class="empty-meta">
          Notorious Club Roma - Piazza Barberini<br>
          Via di S. Nicola da Tolentino, 22
        </div>
        <a class="events-link" href="index.html#events">More Details</a>
      </article>

      <article class="panel" id="barcellona">
        <div class="section-head">
          <div class="city">Barcellona</div>
          <div class="date">23 May 2026</div>
        </div>
        <div class="empty-meta">The next European stop will be announced soon</div>
        <a class="events-link" href="index.html#events">More Details</a>
      </article>
    </section>

    <section class="closing shell">
      <p class="closing-copy">Some Nights Never Leave</p>
    </section>
  </main>

  <script>
    const buttons = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.panel');

    function activateEvent(name){
      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.event === name));
      panels.forEach(panel => panel.classList.toggle('active', panel.id === name));
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => activateEvent(button.dataset.event));
    });
  </script>
</body>
</html>
