<!DOCTYPE html>
<html>
<head>
  <title>MINDJSET</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    body {
      position: relative;
      font-family: 'Playfair Display', serif;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-image: url('./ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.28);
    }

    .center {
      position: absolute;
      left: 50%;
      top: 73%;
      transform: translate(-50%, -50%);
      width: 90%;
      text-align: center;
      z-index: 2;
    }

    h1 {
      margin: 0;
      color: white;
      font-style: italic;
      font-weight: 500;
      font-size: 34px;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }

    @media (max-width: 768px) {
      .bg {
        background-position: 60% center;
      }

      .overlay {
        background: rgba(0,0,0,0.35);
      }

      .center {
        top: 75%;
        width: 92%;
      }

      h1 {
        font-size: 28px;
      }
    }

    @media (max-width: 480px) {
      .bg {
        background-position: 62% center;
      }

      .overlay {
        background: rgba(0,0,0,0.40);
      }

      .center {
        top: 76%;
        width: 94%;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="center">
    <h1>Coming soon</h1>
  </div>
</body>
</html>
