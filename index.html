<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MINDJSET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:"Inter",sans-serif;
overflow:hidden;
}

/* ---------------- PRELOADER ---------------- */

#preloader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .8s ease;
}

#preloader.hide{
opacity:0;
pointer-events:none;
}

.preloader-inner{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:min(90vw,500px);
text-align:center;
}

.preloader-logo{
width:min(380px,70vw);
margin-bottom:40px;
clip-path: inset(20% 0 20% 0);
filter:drop-shadow(0 0 30px rgba(255,0,0,.25));
animation:breath 2.4s ease-in-out infinite;
}

@keyframes breath{
0%{transform:scale(.98)}
50%{transform:scale(1)}
100%{transform:scale(.98)}
}

.loading-bar{
width:100%;
height:2px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden;
margin-bottom:14px;
}

.loading-progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#5a0000,#ff2a2a,#ff6b6b);
box-shadow:0 0 14px rgba(255,0,0,.4);
transition:width .15s ease;
}

.loading-number{
font-size:12px;
letter-spacing:.3em;
text-transform:uppercase;
opacity:.7;
}

/* ---------------- SITE ---------------- */

#site{
opacity:0;
transition:opacity 1s ease;
}

#site.show{
opacity:1;
}

/* ---------------- HERO ---------------- */

.hero{
position:relative;
min-height:100vh;
overflow:hidden;
}

.hero-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.45);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(180deg,transparent,black);
}

.hero-inner{
position:relative;
display:flex;
align-items:flex-end;
min-height:100vh;
padding-bottom:180px;
}

.container{
width:1200px;
max-width:90%;
margin:auto;
}

.hero-title{
font-size:clamp(60px,10vw,140px);
line-height:.9;
font-weight:800;
text-transform:uppercase;
}

.hero-watermark{
position:absolute;
right:40px;
bottom:120px;
width:200px;
opacity:.12;
clip-path: inset(20% 0 20% 0);
}

/* ---------------- MENU ---------------- */

.bottom-nav-wrap{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
z-index:50;
}

.bottom-nav{
width:min(900px,95%);
display:grid;
grid-template-columns:auto 1fr auto;
align-items:center;
padding:10px 16px;
border-radius:999px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
}

.bottom-brand img{
width:110px;
clip-path: inset(20% 0 20% 0);
}

.bottom-menu{
display:flex;
justify-content:center;
gap:26px;
}

.bottom-menu a{
font-size:12px;
letter-spacing:.18em;
text-transform:uppercase;
}

.btn-ticket{
background:#fff;
color:#000;
padding:12px 24px;
border-radius:999px;
font-size:12px;
font-weight:700;
letter-spacing:.12em;
}

/* ---------------- EVENTS ---------------- */

.events{
padding:80px 0;
}

.events-list{
display:grid;
gap:20px;
}

.event-card{
display:grid;
grid-template-columns:1fr 1fr auto;
align-items:center;
padding:26px;
border-radius:24px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
}

.event-city{
font-size:34px;
font-weight:800;
text-transform:uppercase;
}

.event-details{
color:#aaa;
}

.ticket-link{
background:#fff;
color:#000;
padding:12px 22px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.mini-logo{
width:32px;
clip-path: inset(20% 0 20% 0);
}

/* ---------------- MOBILE ---------------- */

@media(max-width:800px){

.hero-title{
font-size:50px;
}

.event-card{
grid-template-columns:1fr;
gap:14px;
}

.bottom-nav{
grid-template-columns:1fr;
gap:12px;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<div class="preloader-inner">

<img src="logo-mindjset.png" class="preloader-logo" alt="Mindjset">

<div class="loading-bar">
<div class="loading-progress" id="loading-progress"></div>
</div>

<div class="loading-number" id="loading-number">0%</div>

</div>

</div>


<div id="site">

<!-- HERO -->

<section class="hero">

<video class="hero-video" autoplay muted loop playsinline>
<source src="assets/hero-mindjset.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-inner">

<div class="container">

<h1 class="hero-title">

Mindjset<br>
nightlife<br>
across iconic cities

</h1>

</div>

</div>

<img src="logo-mindjset.png" class="hero-watermark">

</section>

<!-- MENU -->

<div class="bottom-nav-wrap">

<div class="bottom-nav">

<a class="bottom-brand">
<img src="logo-mindjset.png">
</a>

<div class="bottom-menu">

<a href="#events">Get Ticket</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>

</div>

<a href="#events" class="btn-ticket">Get Ticket</a>

</div>

</div>

<!-- EVENTS -->

<section class="events" id="events">

<div class="container">

<div class="events-list">

<div class="event-card">

<div>
<div class="event-city">Milano</div>
<img src="logo-mindjset.png" class="mini-logo">
</div>

<div class="event-details">
Sabato 28 Marzo<br>
Nepentha Club — Milano
</div>

<div>
<a class="ticket-link">Get Ticket</a>
</div>

</div>

</div>

</div>

</section>

</div>

<script>

const progress=document.getElementById("loading-progress")
const number=document.getElementById("loading-number")
const preloader=document.getElementById("preloader")
const site=document.getElementById("site")

let percent=0

const interval=setInterval(()=>{

percent++

progress.style.width=percent+"%"

number.innerText=percent+"%"

if(percent>=100){

clearInterval(interval)

setTimeout(()=>{

preloader.classList.add("hide")
site.classList.add("show")

document.body.style.overflow="auto"

},300)

}

},20)

</script>

</body>

</html>
