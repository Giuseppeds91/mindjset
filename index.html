<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MINDJSET</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:black;
font-family:Georgia, serif;
overflow:hidden;
}

/* VIDEO BACKGROUND */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* CONTENUTO */

.container{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

/* LOGO */

.logo{
max-width:65%;
height:auto;
margin-bottom:30px;
}

/* TESTO */

.text{
color:white;
font-style:italic;
font-size:22px;
letter-spacing:2px;
margin-bottom:15px;
}

/* DOTS */

.dots{
display:flex;
gap:10px;
margin-bottom:30px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:pulse 1.6s infinite;
}

.dot:nth-child(2){
animation-delay:0.2s;
}

.dot:nth-child(3){
animation-delay:0.4s;
}

@keyframes pulse{
0%,100%{
opacity:0.3;
transform:scale(0.9);
}
50%{
opacity:1;
transform:scale(1.3);
}
}

/* INSTAGRAM */

.instagram img{
width:28px;
opacity:0.8;
transition:0.3s;
}

.instagram img:hover{
opacity:1;
transform:scale(1.1);
}

/* MOBILE */

@media (max-width:768px){

.logo{
max-width:85%;
}

.text{
font-size:18px;
}

}

</style>

</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="container">

<img src="ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg" class="logo">

<div class="text">Launching soon</div>

<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="instagram">
<a href="instagram://user?username=mindjset"
onclick="setTimeout(function(){ window.location='https://www.instagram.com/mindjset'; }, 500)">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
</div>

</div>

</body>

</html>
