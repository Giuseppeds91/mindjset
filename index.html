<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MINDJSET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:"Inter",sans-serif;
overflow:hidden;
}

/* ---------------- PRELOADER ---------------- */

#preloader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .8s ease;
}

#preloader.hide{
opacity:0;
pointer-events:none;
}

.preloader-inner{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:min(90vw,500px);
text-align:center;
}

.preloader-logo{
width:min(380px,70vw);
margin-bottom:40px;
clip-path: inset(20% 0 20% 0);
filter:drop-shadow(0 0 30px rgba(255,0,0,.25));
animation:breath 2.4s ease-in-out infinite;
}

@keyframes breath{
0%{transform:scale(.98)}
50%{transform:scale(1)}
100%{transform:scale(.98)}
}

.loading-bar{
width:100%;
height:2px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden;
margin-bottom:14px;
}

.loading-progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#5a0000,#ff2a2a,#ff6b6b);
box-shadow:0 0 14px rgba(255,0,0,.4);
transition:width .15s ease;
}

.loading-number{
font-size:12px;
letter-spacing:.3em;
text-transform:uppercase;
opacity:.7;
}

/* ---------------- SITE ---------------- */

#site{
opacity:0;
transition:opacity 1s ease;
min-height:100vh;
}

#site.show{
opacity:1;
}

.container{
width:min(1200px,90%);
margin:auto;
}

/* ---------------- HERO ---------------- */

.hero{
position:relative;
min-height:100vh;
overflow:hidden;
}

.hero-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.28);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,.45),rgba(0,0,0,.8));
}

.hero-inner{
position:relative;
display:flex;
align-items:flex-end;
min-height:100vh;
padding-bottom:200px;
}

.hero-title{
font-size:clamp(60px,10vw,140px);
line-height:.9;
font-weight:800;
text-transform:uppercase;
letter-spacing:-.06em;
}

/* ---------------- BOTTOM MENU ---------------- */

.bottom-nav-wrap{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
z-index:50;
}

.bottom-nav{
width:min(900px,95%);
display:grid;
grid-template-columns:1fr auto;
align-items:center;
padding:10px 16px;
border-radius:24px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
gap:16px;
}

.bottom-menu{
display:flex;
gap:22px;
align-items:center;
}

.bottom-menu a{
font-size:11px;
letter-spacing:.18em;
text-transform:uppercase;
}

.btn-ticket{
background:#fff;
color:#000;
padding:12px 24px;
border-radius:999px;
font-size:12px;
font-weight:700;
letter-spacing:.12em;
}

/* ---------------- EVENTS ---------------- */

.events{
padding:60px 0 120px;
}

.events-list{
display:grid;
grid-template-columns:1.3fr 1fr 1fr 1fr;
gap:20px;
}

.event-card{
display:flex;
flex-direction:column;
justify-content:space-between;
padding:24px;
border-radius:24px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
min-height:220px;
}

.event-city{
font-size:30px;
font-weight:800;
text-transform:uppercase;
}

.live-badge{
background:#ff2a2a;
color:#fff;
font-size:10px;
padding:4px 8px;
border-radius:6px;
margin-left:8px;
letter-spacing:.2em;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

.event-date{
margin-top:12px;
font-weight:700;
}

.event-location{
color:#aaa;
font-size:14px;
}

.event-note{
color:#aaa;
font-size:14px;
}

.ticket-link{
margin-top:20px;
background:#fff;
color:#000;
padding:12px 20px;
border-radius:999px;
font-size:11px;
font-weight:800;
letter-spacing:.15em;
display:inline-block;
}

.soon{
margin-top:20px;
font-size:11px;
letter-spacing:.2em;
color:#888;
text-transform:uppercase;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:900px){

.hero-title{
font-size:50px;
}

.events-list{
grid-template-columns:1fr;
}

.bottom-nav{
grid-template-columns:1fr;
gap:10px;
}

.bottom-menu{
justify-content:center;
}

.btn-ticket{
width:100%;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<div class="preloader-inner">

<img src="logo-mindjset.png" class="preloader-logo">

<div class="loading-bar">
<div class="loading-progress" id="loading-progress"></div>
</div>

<div class="loading-number" id="loading-number">0%</div>

</div>

</div>

<div id="site">

<!-- HERO -->

<section class="hero">

<video class="hero-video" autoplay muted loop playsinline>
<source src="nightlife-bg.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-inner">

<div class="container">

<h1 class="hero-title">
Mindjset<br>
nightlife<br>
across iconic cities
</h1>

</div>

</div>

</section>

<!-- MENU -->

<div class="bottom-nav-wrap">

<div class="bottom-nav">

<div class="bottom-menu">
<a href="#events">Events</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</div>

<a href="javascript:void(0)" class="btn-ticket">Get Ticket</a>

</div>

</div>

<!-- EVENTS -->

<section class="events" id="events">

<div class="container">

<div class="events-list">

<div class="event-card">

<div>
<div class="event-city">
Milano <span class="live-badge">LIVE</span>
</div>

<div class="event-date">
Sabato 28 Marzo
</div>

<div class="event-location">
Nepentha Club — Piazza Armando Diaz, Milano
</div>
</div>

<a class="ticket-link">Get Ticket</a>

</div>

<div class="event-card">

<div class="event-city">Roma</div>

<div class="event-note">
Dettagli in arrivo
</div>

<span class="soon">Coming Soon</span>

</div>

<div class="event-card">

<div class="event-city">Barcellona</div>

<div class="event-note">
Dettagli in arrivo
</div>

<span class="soon">Coming Soon</span>

</div>

<div class="event-card">

<div class="event-city">Portofino</div>

<div class="event-note">
Dettagli in arrivo
</div>

<span class="soon">Coming Soon</span>

</div>

</div>

</div>

</section>

</div>

<script>

const progress=document.getElementById("loading-progress")
const number=document.getElementById("loading-number")
const preloader=document.getElementById("preloader")
const site=document.getElementById("site")

let percent=0

const interval=setInterval(()=>{

percent++

progress.style.width=percent+"%"

number.innerText=percent+"%"

if(percent>=100){

clearInterval(interval)

setTimeout(()=>{

preloader.classList.add("hide")
site.classList.add("show")

document.body.style.overflow="auto"

},300)

}

},20)

</script>

</body>

</html>
