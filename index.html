<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINDJSET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#000;
--white:#fff;
--muted:rgba(255,255,255,.68);
--muted-2:rgba(255,255,255,.52);
--line:rgba(255,255,255,.10);
--glass:rgba(10,10,10,.56);
--red:#ff2a2a;
--shadow:0 20px 60px rgba(0,0,0,.35);
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:#fff;
font-family:"Inter",sans-serif;
overflow:hidden;
-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility;
}

a{
color:inherit;
text-decoration:none;
}

img,video{
display:block;
max-width:100%;
}

/* ---------------- PRELOADER ---------------- */

#preloader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .8s ease;
}

#preloader.hide{
opacity:0;
pointer-events:none;
}

.preloader-inner{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:min(90vw,500px);
text-align:center;
}

.preloader-logo{
width:min(380px,70vw);
margin-bottom:40px;
clip-path: inset(42% 0 42% 0);
filter:drop-shadow(0 0 30px rgba(255,0,0,.25));
animation:breath 2.4s ease-in-out infinite;
}

@keyframes breath{
0%{transform:scale(.98)}
50%{transform:scale(1)}
100%{transform:scale(.98)}
}

.loading-bar{
width:100%;
height:2px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden;
margin-bottom:14px;
}

.loading-progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#5a0000,#ff2a2a,#ff6b6b);
box-shadow:0 0 14px rgba(255,0,0,.4);
transition:width .15s ease;
}

.loading-number{
font-size:12px;
letter-spacing:.3em;
text-transform:uppercase;
opacity:.7;
}

/* ---------------- SITE ---------------- */

#site{
opacity:0;
transition:opacity 1s ease;
min-height:100vh;
background:#000;
}

#site.show{
opacity:1;
}

.container{
width:min(1220px, calc(100% - 40px));
margin:auto;
}

/* ---------------- HERO ---------------- */

.hero{
position:relative;
min-height:100vh;
overflow:hidden;
background:#000;
}

.hero-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:grayscale(.08) brightness(.24) contrast(1.02) saturate(.88);
}

.hero-overlay{
position:absolute;
inset:0;
z-index:1;
background:
linear-gradient(180deg, rgba(0,0,0,.54) 0%, rgba(0,0,0,.36) 24%, rgba(0,0,0,.58) 62%, rgba(0,0,0,.88) 100%);
}

.hero-inner{
position:relative;
z-index:2;
min-height:100vh;
display:flex;
align-items:flex-end;
padding:0 0 250px;
}

.hero-copy{
max-width:980px;
}

.hero-title{
font-size:clamp(48px, 8.2vw, 132px);
line-height:.9;
font-weight:800;
text-transform:uppercase;
letter-spacing:-.065em;
max-width:980px;
}

/* ---------------- BOTTOM NAV ---------------- */

.bottom-nav-wrap{
position:fixed;
left:0;
right:0;
bottom:18px;
z-index:70;
pointer-events:none;
padding:0 12px;
}

.bottom-nav{
width:min(920px, 100%);
margin:0 auto;
min-height:64px;
display:grid;
grid-template-columns:1fr auto;
align-items:center;
gap:18px;
padding:10px 12px 10px 16px;
border-radius:24px;
background:rgba(8,8,8,.68);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.10);
box-shadow:0 16px 40px rgba(0,0,0,.34);
pointer-events:auto;
}

.bottom-menu{
display:flex;
gap:12px;
}

.nav-link{
display:inline-flex;
align-items:center;
justify-content:center;
min-height:42px;
padding:0 16px;
border-radius:999px;
font-size:11px;
font-weight:600;
letter-spacing:.18em;
text-transform:uppercase;
}

.btn-ticket{
display:inline-flex;
align-items:center;
justify-content:center;
min-height:44px;
padding:0 20px;
border-radius:999px;
background:#fff;
color:#000;
font-size:11px;
font-weight:800;
letter-spacing:.18em;
}

/* ---------------- EVENTS ---------------- */

.events{
background:#000;
padding:26px 0 120px;
}

.events-list{
display:grid;
grid-template-columns:1.25fr .9fr .9fr .9fr;
gap:18px;
}

.event-card{
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:250px;
padding:24px;
border-radius:28px;
background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
border:1px solid rgba(255,255,255,.10);
}

.event-card.featured{
border-color:rgba(255,255,255,.14);
}

.event-city{
font-size:clamp(24px, 2.2vw, 34px);
font-weight:800;
text-transform:uppercase;
}

.live-badge{
background:rgba(255,42,42,.14);
border:1px solid rgba(255,42,42,.38);
color:#ff3b3b;
font-size:10px;
padding:4px 10px;
border-radius:999px;
margin-left:10px;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

.ticket-link{
display:inline-flex;
align-items:center;
justify-content:center;
min-height:46px;
padding:0 20px;
border-radius:999px;
background:#fff;
color:#000;
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
}

/* ---------------- CONTACT PANEL ---------------- */

.contact-panel{
position:fixed;
right:20px;
bottom:100px;
width:320px;
padding:22px;
border-radius:24px;
background:rgba(8,8,8,.9);
border:1px solid rgba(255,255,255,.10);
box-shadow:var(--shadow);
z-index:80;
opacity:0;
transform:translateY(18px);
pointer-events:none;
transition:opacity .28s ease, transform .28s ease;
}

.contact-panel.show{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

.contact-title{
font-size:14px;
font-weight:700;
letter-spacing:.16em;
text-transform:uppercase;
margin-bottom:14px;
}

.contact-value{
font-size:15px;
}

</style>
</head>

<body>

<div id="preloader">
<div class="preloader-inner">

<img src="logo-mindjset.png" class="preloader-logo">

<div class="loading-bar">
<div class="loading-progress" id="loading-progress"></div>
</div>

<div class="loading-number" id="loading-number">0%</div>

</div>
</div>

<div id="site">

<section class="hero">

<video class="hero-video" autoplay muted loop playsinline preload="auto">
<source src="nightlife-bg.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-inner">
<div class="container">
<div class="hero-copy">

<h1 class="hero-title">
Mindjset<br>
nightlife<br>
across iconic cities
</h1>

</div>
</div>
</div>

</section>

<div class="bottom-nav-wrap">
<div class="bottom-nav">

<nav class="bottom-menu">
<a href="#events" class="nav-link">Events</a>
<a href="#gallery" class="nav-link">Gallery</a>
<a href="javascript:void(0)" class="nav-link" id="contact-toggle">Contact</a>
</nav>

<a href="javascript:void(0)" class="btn-ticket">Get Ticket</a>

</div>
</div>

<section class="events" id="events">
<div class="container">

<div class="events-list">

<article class="event-card featured">

<div>
<div class="event-city">Milano <span class="live-badge">Live</span></div>
<div>Sabato 28 Marzo</div>
<div>Nepentha Club — Piazza Armando Diaz, Milano</div>
</div>

<div>
<a class="ticket-link">Get Ticket</a>
</div>

</article>

<article class="event-card">
<div class="event-city">Roma</div>
<div>Dettagli in arrivo</div>
</article>

<article class="event-card">
<div class="event-city">Barcellona</div>
<div>Dettagli in arrivo</div>
</article>

<article class="event-card">
<div class="event-city">Portofino</div>
<div>Dettagli in arrivo</div>
</article>

</div>
</div>
</section>

</div>

<aside class="contact-panel" id="contact-panel">

<div class="contact-title">Contact</div>

<div class="contact-value">
<a href="mailto:mindjsetmusic@gmail.com">mindjsetmusic@gmail.com</a>
</div>

</aside>

<script>

const progress=document.getElementById("loading-progress")
const number=document.getElementById("loading-number")
const preloader=document.getElementById("preloader")
const site=document.getElementById("site")

let percent=0

const interval=setInterval(()=>{

percent++

progress.style.width=percent+"%"
number.innerText=percent+"%"

if(percent>=100){

clearInterval(interval)

setTimeout(()=>{

preloader.classList.add("hide")
site.classList.add("show")
document.body.style.overflow="auto"

},300)

}

},20)

const contactToggle=document.getElementById("contact-toggle")
const contactPanel=document.getElementById("contact-panel")

contactToggle.onclick=()=>{
contactPanel.classList.toggle("show")
}

</script>

</body>
</html>
