<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINDJSET</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
font-family:'Playfair Display', serif;
}

body{
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.page{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:24px;
box-sizing:border-box;
}

/* LOGO */

.logo-wrap{
width:100%;
display:flex;
justify-content:center;
margin-bottom:60px;
}

.logo-wrap img{
width:min(100vw,900px);
height:auto;
display:block;
}

/* TESTO */

.text{
display:flex;
flex-direction:column;
gap:6px;
margin-top:20px;
}

.private{
font-style:italic;
font-weight:500;
font-size:24px;
letter-spacing:0.5px;
}

.launch{
font-style:italic;
font-weight:500;
font-size:24px;
letter-spacing:0.5px;
}

/* TABLET */

@media (max-width:768px){

.logo-wrap img{
width:min(100vw,700px);
}

.private{
font-size:22px;
}

.launch{
font-size:22px;
}

}

/* MOBILE */

@media (max-width:480px){

.logo-wrap img{
width:min(100vw,520px);
}

.private{
font-size:18px;
}

.launch{
font-size:18px;
margin-top:10px;
}

}

</style>
</head>

<body>

<div class="page">

<div class="logo-wrap">
<img src="./ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg">
</div>

<div class="text">
<div class="private">Private experiences</div>
<div class="launch">Launching soon</div>
</div>

</div>

</body>
</html>
