<!DOCTYPE html>
<html>
<head>
  <title>MINDJSET</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <style>
    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
      font-family:'Playfair Display', serif;
    }

    .bg{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      z-index:-2;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.30);
      z-index:-1;
    }

    .center{
      position:absolute;
      left:50%;
      top:72%;
      transform:translate(-50%,-50%);
      width:90%;
      text-align:center;
      padding:0 12px;
      box-sizing:border-box;
    }

    h1{
      margin:0;
      color:white;
      font-style:italic;
      font-weight:500;
      letter-spacing:2px;
      font-size:34px;
      line-height:1.1;
      text-shadow:0 2px 12px rgba(0,0,0,0.45);
    }

    @media (max-width: 768px){
      .bg{
        object-position:58% center;
      }

      .overlay{
        background:rgba(0,0,0,0.38);
      }

      .center{
        top:74%;
        width:92%;
      }

      h1{
        font-size:28px;
        letter-spacing:1.5px;
      }
    }

    @media (max-width: 480px){
      .bg{
        object-position:60% center;
      }

      .overlay{
        background:rgba(0,0,0,0.42);
      }

      .center{
        top:75%;
        width:94%;
      }

      h1{
        font-size:24px;
        letter-spacing:1px;
      }
    }
  </style>
</head>

<body>
  <img class="bg" src="ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg" alt="Mindjset background">
  <div class="overlay"></div>

  <div class="center">
    <h1>Coming soon</h1>
  </div>
</body>
</html>
