<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINDJSET</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
font-family:'Playfair Display', serif;
}

body{
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.page{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:24px;
box-sizing:border-box;
}

/* LOGO */

.logo-wrap{
width:100%;
display:flex;
justify-content:center;
margin-bottom:40px;
}

.logo-wrap img{
width:min(88vw,520px);
height:auto;
display:block;
}

/* SCRITTA */

.coming{
font-style:italic;
font-weight:500;
font-size:34px;
letter-spacing:0.5px;
margin-top:10px;
}

/* TABLET */

@media (max-width:768px){

.logo-wrap img{
width:min(92vw,420px);
}

.coming{
font-size:28px;
margin-top:30px;
}

}

/* MOBILE */

@media (max-width:480px){

.logo-wrap img{
width:min(95vw,360px);
}

.coming{
font-size:24px;
margin-top:40px;
}

}

</style>
</head>

<body>

<div class="page">

<div class="logo-wrap">
<img src="./ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg">
</div>

<h1 class="coming">Coming soon</h1>

</div>

</body>
</html>
