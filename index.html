<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MINDJSET</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

/* INTRO */

#intro-loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.intro-logo{
width:250px;
animation:logoZoom 2s ease forwards;
}

@keyframes logoZoom{

0%{
opacity:0;
transform:scale(0.2);
}

40%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(5);
}

}

</style>

</head>

<body>

<div id="intro-loader">

<img src="images/logo-mindjset.png" class="intro-logo">

</div>

<script>

setTimeout(function(){

document.getElementById("intro-loader").style.display="none";
document.body.style.overflow="auto";

},2000);

</script>

</body>
</html>
