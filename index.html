<!DOCTYPE html>
<html>
<head>
<title>MINDJSET</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
font-family:'Playfair Display', serif;
}

/* contenitore principale */

.wrapper{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
background:black;
}

/* immagine centrata */

.image-container{
width:100%;
display:flex;
justify-content:center;
background:black;
}

.image-container img{
max-width:100%;
height:auto;
max-height:70vh;
object-fit:contain;
}

/* sezione sotto tutta nera */

.bottom{
flex:1;
width:100%;
background:black;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* scritta */

h1{
margin-top:40px;
color:white;
font-style:italic;
font-weight:500;
font-size:34px;
letter-spacing:1px;
text-shadow:0 2px 10px rgba(0,0,0,0.45);
}

/* tablet */

@media (max-width:768px){

.image-container img{
max-height:65vh;
}

h1{
font-size:28px;
}

}

/* mobile */

@media (max-width:480px){

.image-container img{
max-height:60vh;
}

h1{
font-size:24px;
margin-top:30px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="image-container">
<img src="ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg">
</div>

<div class="bottom">
<h1>Coming soon</h1>
</div>

</div>

</body>
</html>
