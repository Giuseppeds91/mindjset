<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindjset</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  background:#ffffff;
  color:#111111;
  overflow:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

img{
  display:block;
  max-width:100%;
}

/* PRELOADER */

#preloader{
  position:fixed;
  inset:0;
  background:#000000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.preloader-inner{
  width:min(88vw, 680px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.preloader-logo{
  width:min(440px, 72vw);
  height:auto;
  margin-bottom:42px;
  object-fit:contain;
  filter:drop-shadow(0 0 24px rgba(255,0,0,0.14));
}

.loading-meta{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
  color:rgba(255,255,255,0.82);
  font-size:12px;
  letter-spacing:0.22em;
  text-transform:uppercase;
}

.loading-meta-left{
  opacity:0.75;
}

.loading-number{
  font-size:14px;
  font-weight:700;
  letter-spacing:0.16em;
}

.loading-bar{
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.14);
  position:relative;
  overflow:hidden;
}

.loading-progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg, #7a0000 0%, #ff1a1a 55%, #ff4d4d 100%);
  box-shadow:0 0 14px rgba(255,0,0,0.4);
  transition:width 0.08s linear;
}

.loading-big{
  margin-top:18px;
  color:#ffffff;
  font-size:52px;
  line-height:1;
  letter-spacing:-0.04em;
  font-weight:700;
}

/* SITE */

#site{
  opacity:0;
  transform:translateY(10px);
  transition:opacity 0.9s ease, transform 0.9s ease;
}

#site.show{
  opacity:1;
  transform:translateY(0);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 60px;
  border-bottom:1px solid #ececec;
  background:#ffffff;
}

header img{
  width:170px;
  height:auto;
}

nav{
  display:flex;
  align-items:center;
  gap:30px;
}

nav a{
  color:#111111;
  font-size:14px;
  letter-spacing:0.08em;
}

.hero{
  min-height:82vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
}

.hero-inner{
  max-width:820px;
}

.hero h1{
  font-size:clamp(42px, 9vw, 96px);
  line-height:0.95;
  margin-bottom:16px;
}

.hero p{
  font-size:18px;
  line-height:1.7;
  color:#666666;
  max-width:640px;
  margin:0 auto;
}

@media(max-width:768px){
  header{
    padding:18px 20px;
    flex-direction:column;
    gap:16px;
  }

  header img{
    width:150px;
  }

  nav{
    gap:18px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .preloader-logo{
    width:min(300px, 74vw);
    margin-bottom:32px;
  }

  .loading-big{
    font-size:38px;
  }

  .hero p{
    font-size:16px;
  }
}
</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
  <div class="preloader-inner">
    <img src="logo-mindjset.png" alt="Mindjset logo" class="preloader-logo">

    <div class="loading-meta">
      <div class="loading-meta-left">Loading experience</div>
      <div class="loading-number" id="loading-small">0%</div>
    </div>

    <div class="loading-bar">
      <div class="loading-progress" id="loading-progress"></div>
    </div>

    <div class="loading-big" id="loading-big">0%</div>
  </div>
</div>

<!-- SITE -->
<div id="site">
  <header>
    <img src="logo-mindjset.png" alt="Mindjset logo">

    <nav>
      <a href="#">Home</a>
      <a href="#">Events</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h1>Mindjset</h1>
      <p>A curated world of private experiences, selected people and iconic destinations.</p>
    </div>
  </section>
</div>

<script>
let percent = 0;

const loadingSmall = document.getElementById("loading-small");
const loadingBig = document.getElementById("loading-big");
const loadingProgress = document.getElementById("loading-progress");
const preloader = document.getElementById("preloader");
const site = document.getElementById("site");

const interval = setInterval(function(){
  percent++;

  loadingSmall.innerText = percent + "%";
  loadingBig.innerText = percent + "%";
  loadingProgress.style.width = percent + "%";

  if(percent >= 100){
    clearInterval(interval);

    setTimeout(function(){
      preloader.style.opacity = "0";
      preloader.style.transition = "opacity 0.8s ease";

      setTimeout(function(){
        preloader.style.display = "none";
        document.body.style.overflow = "auto";
        site.classList.add("show");
      }, 800);
    }, 250);
  }
}, 20);
</script>

</body>
</html>
