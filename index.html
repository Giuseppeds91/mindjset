<!DOCTYPE html>
<html>
<head>
  <title>MINDJSET</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      color:white;
      text-align:center;
      background:url("ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg") center center / cover no-repeat;
      height:100vh;
      overflow:hidden;
      position:relative;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.28);
    }

    .center{
      position:absolute;
      left:50%;
      top:74%;
      transform:translate(-50%,-50%);
      z-index:1;
      width:90%;
      max-width:900px;
    }

    h1{
      margin:0;
      font-size:42px;
      letter-spacing:4px;
      font-weight:600;
      line-height:1.1;
    }

    @media (max-width: 768px){
      .center{
        top:72%;
        width:88%;
      }

      h1{
        font-size:32px;
        letter-spacing:3px;
      }
    }

    @media (max-width: 480px){
      .center{
        top:74%;
        width:90%;
      }

      h1{
        font-size:26px;
        letter-spacing:2px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="center">
    <h1>COMING SOON</h1>
  </div>
</body>
</html>
