<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MINDJSET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Inter, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* CONTAINER */

.container{
max-width:800px;
padding:20px;
}

/* LOGO */

.logo{
width:260px;
margin:auto;
margin-bottom:60px;
filter:drop-shadow(0 0 40px rgba(255,0,0,.6)) saturate(1.5);
}

/* TITLE */

.title{
font-family:"Playfair Display", serif;
font-size:56px;
font-style:italic;
margin-bottom:20px;
letter-spacing:0.04em;
}

/* TEXT */

.subtitle{
color:#bcbcbc;
font-size:18px;
margin-bottom:18px;
}

/* CITIES */

.cities{
color:#9a9a9a;
font-size:18px;
letter-spacing:0.05em;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:38px;
}

.logo{
width:180px;
margin-bottom:40px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="logo-mindjset.png" class="logo">

<h1 class="title">Launching Soon</h1>

<p class="subtitle">
Private experiences for a selected community
</p>

<p class="cities">
Milano — Roma — Barcellona — Portofino
</p>

</div>

</body>
</html>
