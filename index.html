<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mindjset</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:white;
color:black;
overflow:hidden;
}

/* PRELOADER */

#preloader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.preloader-logo{
width:400px;
max-width:80%;
height:auto;
margin-bottom:40px;
}

.loading-text{
color:white;
font-size:40px;
font-weight:bold;
}

/* SITE */

#site{
opacity:0;
transition:1s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
border-bottom:1px solid #eee;
}

header img{
width:160px;
height:auto;
}

nav a{
margin-left:30px;
text-decoration:none;
color:black;
font-size:14px;
letter-spacing:1px;
}

.hero{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:80px;
}

@media(max-width:768px){

header{
padding:20px;
}

.hero h1{
font-size:40px;
}

}

</style>
</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="logo-mindjset.png" class="preloader-logo">

<div class="loading-text" id="loading">0%</div>

</div>


<!-- SITE -->

<div id="site">

<header>

<img src="logo-mindjset.png">

<nav>
<a href="#">Home</a>
<a href="#">Events</a>
<a href="#">Contact</a>
</nav>

</header>


<section class="hero">

<h1>Mindjset</h1>

</section>

</div>


<script>

let percent = 0;

let interval = setInterval(function(){

percent++;

document.getElementById("loading").innerText = percent + "%";

if(percent >= 100){

clearInterval(interval);

document.getElementById("preloader").style.display = "none";

document.body.style.overflow="auto";

document.getElementById("site").style.opacity = "1";

}

},20);

</script>


</body>
</html>
