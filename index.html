<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINDJSET</title>

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
}

body{
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia, serif;
overflow:hidden;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.logo{
max-width:65%;
height:auto;
margin-bottom:35px;
opacity:0;
transform:translateY(10px);
animation:logoFade 1.8s ease forwards;
}

.text{
color:white;
font-style:italic;
font-size:22px;
letter-spacing:2px;
margin-bottom:15px;
opacity:0;
animation:textFade 1.5s ease forwards;
animation-delay:1s;
}

.dots{
display:flex;
gap:10px;
opacity:0;
animation:dotsAppear 1.5s ease forwards;
animation-delay:1.4s;
margin-bottom:25px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:pulse 1.6s ease-in-out infinite;
}

.dot:nth-child(2){
animation-delay:0.2s;
}

.dot:nth-child(3){
animation-delay:0.4s;
}

.instagram{
opacity:0;
animation:instaFade 1.5s ease forwards;
animation-delay:2s;
}

.instagram img{
width:28px;
height:28px;
opacity:0.8;
transition:0.3s;
}

.instagram img:hover{
opacity:1;
transform:scale(1.1);
}

@keyframes logoFade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes textFade{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes dotsAppear{
from{opacity:0;}
to{opacity:1;}
}

@keyframes instaFade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes pulse{
0%,100%{
opacity:0.3;
transform:scale(0.9);
}
50%{
opacity:1;
transform:scale(1.3);
}
}

@media (max-width:768px){

.logo{
max-width:85%;
margin-bottom:28px;
}

.text{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg" class="logo">

<div class="text">Launching soon</div>

<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="instagram">
<a href="https://www.instagram.com/mindjset?igsh=MThzb3BkeHM4M3Vrbw==" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
</div>

</div>

</body>

</html>
