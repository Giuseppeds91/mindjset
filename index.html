<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MINDJSET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:Inter, sans-serif;
overflow:hidden;
}

/* PRELOADER */

#preloader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.preloader-logo{
width:280px;
margin-bottom:40px;
filter:drop-shadow(0 0 40px rgba(255,0,0,.6)) saturate(1.5);
}

.loading-bar{
width:260px;
height:2px;
background:#222;
overflow:hidden;
margin-bottom:15px;
}

.loading-progress{
height:100%;
width:0%;
background:#ff2020;
transition:width .2s;
}

.loading-number{
color:white;
font-family:"Playfair Display", serif;
font-style:italic;
font-size:28px;
}

/* SITE */

#site{
display:none;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.container{
max-width:700px;
padding:20px;
}

.logo{
width:260px;
margin:auto;
margin-bottom:50px;
filter:drop-shadow(0 0 50px rgba(255,0,0,.6)) saturate(1.6);
}

.title{
font-family:"Playfair Display", serif;
font-size:56px;
font-style:italic;
margin-bottom:20px;
}

.subtitle{
font-size:18px;
color:#c0c0c0;
margin-bottom:15px;
}

.cities{
font-size:18px;
color:#8f8f8f;
letter-spacing:0.05em;
}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="logo-mindjset.png" class="preloader-logo">

<div class="loading-bar">
<div class="loading-progress" id="progress"></div>
</div>

<div class="loading-number" id="percent">0%</div>

</div>

<!-- SITE -->

<div id="site">

<div class="container">

<img src="logo-mindjset.png" class="logo">

<h1 class="title">Launching Soon</h1>

<p class="subtitle">
Private experiences for a selected community
</p>

<p class="cities">
Milano — Roma — Barcellona — Portofino
</p>

</div>

</div>

<script>

let percent = 0;

let progress = document.getElementById("progress");
let percentText = document.getElementById("percent");

let interval = setInterval(function(){

percent++;

progress.style.width = percent + "%";
percentText.innerText = percent + "%";

if(percent >= 100){

clearInterval(interval);

document.getElementById("preloader").style.display="none";
document.getElementById("site").style.display="flex";

}

},25);

</script>

</body>
</html>
