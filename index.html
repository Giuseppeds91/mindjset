<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindjset</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      font-family: Arial, Helvetica, sans-serif;
      background:#ffffff;
      color:#111111;
    }

    body.loading{
      overflow:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      display:block;
      max-width:100%;
    }

    /* PRELOADER */

    #preloader{
      position:fixed;
      inset:0;
      background:#000;
      z-index:99999;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 0.8s ease, visibility 0.8s ease;
      opacity:1;
      visibility:visible;
    }

    #preloader.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .preloader-inner{
      width:min(90vw, 1100px);
      padding:40px 20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:32px;
    }

    .preloader-logo{
      width:min(460px, 72vw);
      height:auto;
      object-fit:contain;
      filter: drop-shadow(0 0 24px rgba(255,0,0,0.18));
      animation: logoPulse 1.8s ease-in-out infinite;
    }

    @keyframes logoPulse{
      0%{ transform:scale(1); opacity:0.92; }
      50%{ transform:scale(1.03); opacity:1; }
      100%{ transform:scale(1); opacity:0.92; }
    }

    .loading-row{
      width:min(520px, 80vw);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .loading-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#ffffff;
      font-size:13px;
      letter-spacing:0.22em;
      text-transform:uppercase;
      opacity:0.82;
    }

    .loading-bar{
      width:100%;
      height:2px;
      background:rgba(255,255,255,0.16);
      overflow:hidden;
      position:relative;
    }

    .loading-progress{
      width:0%;
      height:100%;
      background:#ff1f1f;
      transition:width 0.08s linear;
      box-shadow:0 0 16px rgba(255,0,0,0.35);
    }

    .loading-percent{
      color:#ffffff;
      font-size:52px;
      line-height:1;
      letter-spacing:-0.04em;
      font-weight:700;
    }

    /* SITE */

    .site-content{
      opacity:0;
      transform:translateY(10px);
      transition:opacity 0.9s ease, transform 0.9s ease;
    }

    .site-content.show{
      opacity:1;
      transform:translateY(0);
    }

    .header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(255,255,255,0.96);
      border-bottom:1px solid #ececec;
      backdrop-filter:blur(12px);
    }

    .container{
      width:min(1180px, calc(100% - 32px));
      margin:0 auto;
    }

    .nav{
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .brand img{
      width:180px;
      height:auto;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:34px;
      font-size:15px;
    }

    .menu a{
      color:#222;
    }

    .right-cta{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:0 22px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      transition:0.25s ease;
      border:1px solid #111;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .hero{
      min-height:calc(100vh - 78px);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:80px 0;
    }

    .hero-inner{
      max-width:860px;
    }

    .hero-kicker{
      font-size:12px;
      letter-spacing:0.24em;
      text-transform:uppercase;
      color:#777;
      margin-bottom:22px;
    }

    .hero h1{
      font-size:clamp(42px, 8vw, 104px);
      line-height:0.95;
      letter-spacing:-0.05em;
      margin-bottom:20px;
      font-weight:700;
    }

    .hero p{
      max-width:680px;
      margin:0 auto 30px;
      color:#666;
      font-size:18px;
      line-height:1.7;
    }

    .hero-actions{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
    }

    @media (max-width: 820px){
      .nav{
        flex-wrap:wrap;
        padding:14px 0;
      }

      .menu{
        order:3;
        width:100%;
        justify-content:center;
        gap:20px;
        font-size:14px;
      }

      .brand img{
        width:150px;
      }
    }

    @media (max-width: 640px){
      .container{
        width:min(100% - 20px, 1180px);
      }

      .loading-percent{
        font-size:40px;
      }

      .hero p{
        font-size:16px;
      }

      .btn{
        width:100%;
      }

      .hero-actions{
        flex-direction:column;
      }

      .right-cta{
        width:100%;
      }

      .right-cta .btn{
        width:100%;
      }
    }
  </style>
</head>
<body class="loading">

  <!-- PRELOADER -->
  <div id="preloader">
    <div class="preloader-inner">
      <img src="logo-mindjset.png" alt="Mindjset logo" class="preloader-logo" />

      <div class="loading-row">
        <div class="loading-top">
          <span>Loading</span>
          <span id="loading-percent-text">0%</span>
        </div>

        <div class="loading-bar">
          <div class="loading-progress" id="loading-progress"></div>
        </div>
      </div>

      <div class="loading-percent" id="loading-percent-big">0%</div>
    </div>
  </div>

  <!-- SITE -->
  <div class="site-content" id="site-content">
    <header class="header">
      <div class="container nav">
        <a href="#" class="brand">
          <img src="logo-mindjset.png" alt="Mindjset logo" />
        </a>

        <nav class="menu">
          <a href="#">Home</a>
          <a href="#">Events</a>
          <a href="#">Contact</a>
        </nav>

        <div class="right-cta">
          <a href="#" class="btn btn-primary">Get Ticket</a>
        </div>
      </div>
    </header>

    <main class="hero">
      <div class="container hero-inner">
        <div class="hero-kicker">Private Experiences</div>
        <h1>Mindjset</h1>
        <p>
          A curated world of events, people and destinations.
        </p>
        <div class="hero-actions">
          <a href="#" class="btn btn-primary">Get Ticket</a>
          <a href="#" class="btn">Explore</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const preloader = document.getElementById("preloader");
    const siteContent = document.getElementById("site-content");
    const progress = document.getElementById("loading-progress");
    const percentText = document.getElementById("loading-percent-text");
    const percentBig = document.getElementById("loading-percent-big");

    let current = 0;

    const interval = setInterval(() => {
      current += 1;

      progress.style.width = current + "%";
      percentText.textContent = current + "%";
      percentBig.textContent = current + "%";

      if (current >= 100) {
        clearInterval(interval);

        setTimeout(() => {
          preloader.classList.add("hide");
          siteContent.classList.add("show");
          document.body.classList.remove("loading");
        }, 300);
      }
    }, 18);
  </script>

</body>
</html>
