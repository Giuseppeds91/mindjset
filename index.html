<!DOCTYPE html>
<html>
<head>
<title>MINDJSET</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
margin:0;
padding:0;
height:100%;
font-family: "Playfair Display", serif;
overflow:hidden;
}

/* immagine full responsive */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("ffa8137b-45e1-430b-b761-9beff61c17cb.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-2;
}

/* overlay scuro */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:-1;
}

/* scritta */
.center{
position:absolute;
left:50%;
top:76%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

/* font premium corsivo */
h1{
margin:0;
color:white;
font-style:italic;
font-weight:500;
letter-spacing:3px;
font-size:36px;
}

/* tablet */
@media (max-width:768px){

.center{
top:78%;
}

h1{
font-size:28px;
}

}

/* iphone */
@media (max-width:480px){

.center{
top:80%;
}

h1{
font-size:22px;
}

}

</style>

<!-- font premium -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="center">
<h1>Coming Soon</h1>
</div>

</body>
</html>
