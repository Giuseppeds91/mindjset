<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mindjset</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Montserrat;
overflow-x:hidden;
}

a{
text-decoration:none;
color:white;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#logo-loader{
font-size:60px;
font-weight:600;
color:#d00000;
letter-spacing:6px;
margin-bottom:40px;
}

#progress-bar{
width:200px;
height:2px;
background:#222;
overflow:hidden;
}

#progress{
height:100%;
width:0%;
background:#d00000;
}

#percent{
margin-top:15px;
font-size:14px;
font-style:italic;
font-family:"Playfair Display";
}

/* HEADER */

header{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
z-index:10;
background:transparent;
}

.logo{
font-size:24px;
color:#d00000;
font-weight:600;
letter-spacing:4px;
}

nav a{
margin-left:30px;
font-size:14px;
opacity:0.8;
}

nav a:hover{
opacity:1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
letter-spacing:8px;
color:#d00000;
margin-bottom:20px;
}

.hero button{
margin-top:30px;
padding:14px 30px;
background:#d00000;
border:none;
color:white;
font-size:14px;
letter-spacing:2px;
cursor:pointer;
}

.hero button:hover{
background:#a00000;
}

/* EVENTS */

.events{
padding:120px 20px;
text-align:center;
}

.events h2{
font-size:30px;
margin-bottom:60px;
font-family:"Playfair Display";
}

.event-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.event{
border:1px solid #222;
padding:40px;
width:250px;
transition:0.3s;
}

.event:hover{
border-color:#d00000;
}

.event h3{
margin-bottom:10px;
}

.event p{
font-size:14px;
opacity:0.7;
}

.event button{
margin-top:20px;
background:#d00000;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
font-size:12px;
opacity:0.6;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:40px;
}

.event{
width:100%;
}

header{
padding:20px;
}

nav{
display:none;
}

}

</style>

</head>

<body>

<div id="loader">

<div id="logo-loader">
MINDJSET
</div>

<div id="progress-bar">
<div id="progress"></div>
</div>

<div id="percent">
0%
</div>

</div>

<header>

<div class="logo">
MINDJSET
</div>

<nav>
<a href="#">Events</a>
<a href="#">Community</a>
<a href="#">Travel</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>MINDJSET</h1>

<button>GET TICKET</button>

</section>

<section class="events">

<h2>Upcoming Journey</h2>

<div class="event-list">

<div class="event">
<h3>Milano</h3>
<p>28 March</p>
<button>Get Ticket</button>
</div>

<div class="event">
<h3>Roma</h3>
<p>April</p>
<button>Get Ticket</button>
</div>

<div class="event">
<h3>Portofino</h3>
<p>Summer</p>
<button>Get Ticket</button>
</div>

<div class="event">
<h3>Courmayeur</h3>
<p>Winter</p>
<button>Get Ticket</button>
</div>

</div>

</section>

<footer>

© MINDJSET

</footer>

<script>

let percent = 0;

let interval = setInterval(function(){

percent++;

document.getElementById("percent").innerText = percent + "%";

document.getElementById("progress").style.width = percent + "%";

if(percent >= 100){

clearInterval(interval);

setTimeout(function(){

document.getElementById("loader").style.display="none";

},500);

}

},25);

</script>

</body>
</html>
